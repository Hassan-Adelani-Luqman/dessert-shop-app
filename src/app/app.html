<div class="min-h-screen bg-rose-50">
  <div class="max-w-360 mx-auto px-6 lg:px-8 xl:px-28 py-8 lg:py-16">
    <div class="flex flex-col lg:flex-row lg:items-start gap-8">

      <!-- Products section -->
      <main class="flex-1">
        <h1 class="text-5xl font-bold text-rose-900 mb-8 lg:mb-10">Desserts</h1>
        <app-product-list />
      </main>

      <!-- Cart sidebar -->
      <aside class="w-full lg:w-96 lg:shrink-0 lg:sticky lg:top-8">
        <app-cart (orderConfirmed)="onOrderConfirmed()" />
      </aside>

    </div>
  </div>

  <!-- Order confirmation modal -->
  @if (showModal()) {
    <app-order-confirmation
      [items]="cartService.items()"
      [total]="cartService.orderTotal()"
      (startNewOrder)="onStartNewOrder()"
    />
  }
</div>
